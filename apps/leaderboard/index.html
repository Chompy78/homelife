<!doctype html>

  <meta name="theme-color" content="#5b8def" />
  <title>Homelife - Leaderboard</title>
  <link rel="icon" type="image/png" sizes="32x32" href="../shared/icons/favicon-32.png" />

  <main class="app">
    <header>
      <h1>Family Leaderboard</h1>
