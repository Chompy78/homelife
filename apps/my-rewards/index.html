<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#99b580" />
  <meta name="description" content="See how many rewards you've earned." />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="../shared/icons/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="../shared/icons/favicon-16.png" />
  <link rel="stylesheet" href="styles.css" />
  <title>My Rewards</title>
</head>
<body>
  <div class="gate" id="gate">
    <div class="gateCard">
      <h1>⭐ My Rewards</h1>
      <p>Ask a parent for your code. Enter it once - this device will remember you.</p>
      <form id="codeForm">
        <input id="codeInput" class="codeInput" type="text" inputmode="text" autocapitalize="characters" autocomplete="off" placeholder="XXX-XXX" maxlength="10" />
        <button type="submit" class="codeSubmit">Continue</button>
      </form>
      <p class="codeError hidden" id="codeError"></p>
    </div>
  </div>

  <div class="app hidden" id="app">
    <div class="card" id="rewardCard">
      <button id="refreshBtn" type="button" class="refreshBtn" title="Refresh">🔄</button>
      <div class="avatar" id="avatar">⭐</div>
      <div class="name" id="name"></div>
      <div class="totalLabel">rewards</div>
      <div class="total" id="total">0</div>
      <div class="categoryList" id="categoryList"></div>
      <button id="openTradeBtn" type="button" class="tradeOpenBtn hidden">🔁 Trade<span class="tradeBadge hidden" id="tradeBadge"></span></button>
    </div>
    <p class="switchKid"><a href="#" id="switchKidLink">Not you?</a></p>
  </div>

  <div class="tradeModal hidden" id="tradeModal">
    <div class="tradeCard">
      <div class="tradeHead">
        <h2>🔁 Trades</h2>
        <button id="tradeModalClose" type="button" class="tradeClose">✕</button>
      </div>

      <div id="tradeListView">
        <div id="incomingTrades"></div>
        <div id="outgoingTrades"></div>
        <button id="proposeTradeBtn" type="button" class="tradeActionBtn">+ Propose a trade</button>
        <p class="tradeSecretLink"><a href="#" id="changeSecretLink">🔒 Set/change my secret picture</a></p>
      </div>

      <div id="tradeProposeView" class="hidden">
        <button id="tradeProposeBack" type="button" class="tradeBack">‹ Back</button>
        <div class="tradeField">
          <label>Trade with</label>
          <div id="siblingPicker" class="siblingPicker"></div>
        </div>
        <div class="tradeField">
          <label>You give</label>
          <div class="tradeQtyRow">
            <select id="giveCategorySelect"></select>
            <input id="giveQtyInput" type="number" min="1" max="20" value="1" />
          </div>
        </div>
        <div class="tradeField">
          <label>You get</label>
          <div class="tradeQtyRow">
            <select id="receiveCategorySelect"></select>
            <input id="receiveQtyInput" type="number" min="1" max="20" value="1" />
          </div>
        </div>
        <button id="sendTradeBtn" type="button" class="tradeActionBtn">Send trade offer</button>
        <p class="tradeError hidden" id="tradeError"></p>
      </div>
    </div>
  </div>

  <div class="verifyModal hidden" id="verifyModal">
    <div class="verifyCard">
      <h2 id="verifyTitle">Pick your secret picture</h2>
      <p class="verifySub" id="verifySub"></p>
      <div class="verifyGrid" id="verifyGrid"></div>
      <p class="verifyError hidden" id="verifyError"></p>
      <button id="verifyCancelBtn" type="button" class="verifyCancel">Cancel</button>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
