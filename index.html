<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#5b8def" />
  <title>Homelife</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f3ea;
      color: #2b2b2b;
      padding: 20px;
    }
    .wrap { max-width: 480px; text-align: center; }
    h1 { font-size: 2.2rem; margin-bottom: 8px; }
    p { color: #6f6a60; font-weight: 600; }
    .links { display: grid; gap: 14px; margin-top: 24px; }
    a.tile {
      display: block;
      background: #fff;
      border: 1px solid #e4ded3;
      border-radius: 20px;
      padding: 20px;
      text-decoration: none;
      color: #2b2b2b;
      font-weight: 900;
      font-size: 1.1rem;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }
    a.tile span { display: block; font-weight: 600; color: #6f6a60; font-size: 0.9rem; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Homelife</h1>
    <p>Family apps, all in one place.</p>
    <div class="links">
      <a class="tile" href="apps/bedroom-reset/">Bedroom Reset<span>The kids' checklist app</span></a>
      <a class="tile" href="apps/parent-dashboard/">Parent Dashboard<span>See everyone's progress</span></a>
    </div>
  </div>
</body>
</html>
